# Adaptive Asymmetry-Scanner – Konfiguration v5.0

pipeline:
  confidence_gate: 0.70
  n_simulation_paths: 10000
  simulation_days: 120
  min_impact_threshold: 4
  max_intraday_move: 0.07    # NEU: 7% → Signal verwerfen wenn zu spät
  max_mismatch: 7.0          # Overreaction-Cap: Mismatch > 7 historisch 25% Win, mean −73%

filters:
  min_market_cap: 2_000_000_000
  min_avg_volume: 1_000_000
  universe: "sp500_nasdaq100"

models:
  prescreener: "claude-haiku-4-5-20251001"
  deep_analysis: "claude-sonnet-4-6"

risk:
  vix_threshold: 35.0
  earnings_buffer_days: 7
  min_open_interest: 100
  max_bid_ask_ratio: 0.10
  max_bear_case_severity: 8

options:
  # DTE-Tiers werden in options_designer.py (DTE_TIERS) gesteuert.
  # time_to_materialization aus deep_analysis bestimmt das DTE-Minimum.
  # v11.0 (2026-07 Monats-Tuning): Floor 45/55 → 120. Datenbefund über 98 dedup.
  # closed_trades: DTE 45–119 = 19% Win / Ø −23.6%, DTE≥120 = 41% Win / Ø +12.7%.
  #   "4-8 Wochen"  → dte_floor=120 (war 45 — Sub-120 blutet aus)
  #   "2-3 Monate"  → dte_floor=120 (war 55)
  #   "6 Monate"    → dte_floor=140 (Long-Term Minimum, Thesis-Matching)
  #   unbekannt     → dte_floor=120 (konservativer Default)
  allow_bearish: false       # Bearish-Trades deaktiviert: 0/6 Wins (LONG_PUT mean −86%)
  delta_target_low:  0.55
  delta_target_high: 0.75
  target_move_pct:   0.10
  min_roi_after_spread: 0.15

# Transaktionskosten (fließen ins ROI-Gate ein)
costs:
  commission_per_contract: 0.65   # $/Kontrakt/Seite (Broker-typisch, z.B. Tradier/IBKR)

# Positionsgrößen-Empfehlung (Fractional Kelly)
portfolio:
  size_usd: 5000             # Depotgröße für Sizing-Empfehlung
  kelly_fraction: 0.25       # ¼-Kelly: konservativ, Standard für Options
  max_position_pct: 0.10     # Hard-Cap: max. 10% des Depots pro Trade
  assumed_loss_pct: 0.45     # Erwarteter Verlust bei Stop-Loss (−45%)

learning:
  learning_rate: 0.05
  min_bin_count:  3
  close_after_days: 45         # Geändert: 130 → 45

eps_drift:
  noise_threshold:    0.02
  relevant_threshold: 0.05
  massive_threshold:  0.10

# RL-System
rl:
  enabled: true
  veto_enabled: false           # Option A: PPO-Veto AUS → QuasiML-Ranking.
                                # Grund: Der trainierte PPO-Agent skippte 100% aller
                                # Kandidaten (degenerierte "immer SKIP"-Policy, da der
                                # Trainings-Ledger netto verlustig ist). Erst wieder true,
                                # wenn genug closed_trades unter den neuen Regeln vorliegen
                                # (arm_threshold) und der Reward auf Regret-Shaping umgebaut ist.
  model_path: "outputs/models/ppo_options_agent.zip"
  min_trades_for_training: 3
  timesteps_per_update: 2000
  arm_threshold: 30             # closed_trades (seit arm_since) ab denen eine "RL scharfstellen"-
                                # Email ausgelöst wird (= Phase-1-Validierungsziel)
  arm_since: "2026-06-11"       # Stichtag neue Gates — nur Trades danach zählen fürs Scharfstellen

# FinBERT
finbert:
  enabled: true
  model_name: "ProsusAI/finbert"
  cache_dir: "/tmp/finbert_cache"
  max_headlines: 8
  max_tokens: 128

# Reddit
reddit:
  enabled: true
  subreddits: ["wallstreetbets", "stocks", "investing", "options"]
  max_posts_per_ticker: 50
  time_filter: "day"
  request_delay: 0.5

# Externe API-Quellen
data_sources:

  tradier:
    enabled: true             # false → yfinance Fallback für Option Chains
    base_url: "https://api.tradier.com/v1"
    timeout: 10               # Sekunden pro Request
    # Scope: options_designer.py (Chain + IV-Rank) + feedback.py (P&L-Tracking)
    # Key:   TRADIER_API_KEY als GitHub Secret (nie hier eintragen!)

  alpha_vantage:
    enabled: true             # ALPHA_VANTAGE_API_KEY als Secret
    max_daily_calls: 25       # Free Tier Limit
    eps_tolerance: 0.10       # 10% Abweichung erlaubt

  finnhub:
    enabled: true             # FINNHUB_API_KEY als Secret
    use_for_earnings: true    # Earnings-Gate via Finnhub statt yfinance

  fda:
    enabled: true             # Kein Key nötig
    days_back: 7
    sectors: ["Healthcare", "Biotechnology", "Pharmaceuticals"]

  sec_insider:
    enabled: true             # Kein Key nötig
    days_back: 14
    min_cluster_size: 2       # Mindestens 2 Insider für Cluster-Signal

  flash_alpha:
    enabled: true             # FLASH_ALPHA_API_KEY als Secret
    max_daily_calls: 5        # KRITISCH: Nicht überschreiten!
    top_n: 2                  # Nur für Top-2 Signale

  eulerpool:
    enabled: true             # EULERPOOL_API_KEY als Secret
    top_n: 2                  # Nur für Top-2 Signale
    iv_crush_threshold: 80    # IV-Percentile ab dem Warnung ausgegeben wird
